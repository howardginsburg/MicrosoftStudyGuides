<svg viewBox='0 0 800 214' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Transactional batch all-or-nothing within a partition' font-family='Segoe UI,Arial,sans-serif'><title>Transactional batch all-or-nothing within a partition</title><rect x='0' y='0' width='800' height='214' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Transactional batch</text><rect x='280' y='58' width='240' height='44' rx='9' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400.0' y='86.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Same logical partition</text><rect x='120' y='120' width='160' height='44' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='200.0' y='148.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Create</text><rect x='320' y='120' width='160' height='44' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='400.0' y='148.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Replace</text><rect x='520' y='120' width='160' height='44' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='600.0' y='148.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Delete</text><line x1='400' y1='102' x2='400' y2='112' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='100' y='110' width='600' height='64' rx='12' fill='none' stroke='#107c41' stroke-width='2' stroke-dasharray='6 5'/><text x='400' y='196' text-anchor='middle' fill='#107c41' font-size='12' font-weight='600'>All operations commit together or all roll back — one partition key only</text></svg>