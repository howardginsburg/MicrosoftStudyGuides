<svg viewBox='0 0 800 200' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Point operations versus queries' font-family='Segoe UI,Arial,sans-serif'><title>Point operations versus queries</title><rect x='0' y='0' width='800' height='200' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Point operation vs query</text><rect x='60' y='60' width='320' height='120' rx='12' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='220' y='88' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Point read / write</text><text x='220' y='112' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='400'>needs id + partition key</text><rect x='90' y='126' width='260' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='220.0' y='145.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>~1 RU for a 1 KB read · fastest</text><rect x='90' y='160' width='260' height='14' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='220.0' y='171.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'></text><text x='220' y='170' text-anchor='middle' fill='#5b6b7a' font-size='10.3' font-weight='400'>ReadItem / CreateItem / ReplaceItem</text><rect x='420' y='60' width='320' height='120' rx='12' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='580' y='88' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Query</text><text x='580' y='112' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='400'>filter/scan many items</text><rect x='450' y='126' width='260' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='580.0' y='145.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>cost scales with items &amp; RU used</text><text x='580' y='170' text-anchor='middle' fill='#5b6b7a' font-size='10.3' font-weight='400'>single-partition cheaper than cross-partition</text></svg>