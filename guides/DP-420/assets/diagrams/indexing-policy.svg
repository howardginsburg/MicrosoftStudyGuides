<svg viewBox='0 0 800 230' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Indexing policy included excluded composite' font-family='Segoe UI,Arial,sans-serif'><title>Indexing policy included excluded composite</title><rect x='0' y='0' width='800' height='230' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Indexing policy</text><rect x='60' y='64' width='300' height='150' rx='10' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1.5'/><text x='210' y='88' text-anchor='middle' fill='#0b3d63' font-size='13' font-weight='700'>By default: index everything</text><rect x='80' y='102' width='260' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='210.0' y='121.0' text-anchor='middle' fill='#107c41' font-size='11.5' font-weight='600'>includedPaths: /*</text><rect x='80' y='138' width='260' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='210.0' y='157.0' text-anchor='middle' fill='#b45309' font-size='11.5' font-weight='600'>excludedPaths: /&quot;_etag&quot;/?</text><text x='210' y='196' text-anchor='middle' fill='#5b6b7a' font-size='10.3' font-weight='400'>Range, spatial, and composite index kinds</text><rect x='430' y='64' width='310' height='150' rx='10' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1.5'/><text x='585' y='88' text-anchor='middle' fill='#0b3d63' font-size='13' font-weight='700'>Tune for the workload</text><rect x='450' y='102' width='270' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='585.0' y='121.0' text-anchor='middle' fill='#0b3d63' font-size='10.5' font-weight='600'>Write-heavy → exclude unqueried paths</text><rect x='450' y='138' width='270' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='585.0' y='157.0' text-anchor='middle' fill='#0b3d63' font-size='10.5' font-weight='600'>Read-heavy → add composite indexes</text><text x='585' y='196' text-anchor='middle' fill='#5b6b7a' font-size='10.3' font-weight='400'>Fewer indexed paths = cheaper writes</text></svg>