<svg viewBox='0 0 800 204' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Change feed to functions or processor' font-family='Segoe UI,Arial,sans-serif'><title>Change feed to functions or processor</title><rect x='0' y='0' width='800' height='204' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Change feed</text><rect x='60' y='80' width='180' height='60' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='150' y='106' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Container</text><text x='150' y='126' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>inserts &amp; updates</text><line x1='240' y1='110' x2='300' y2='110' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='300' y='80' width='200' height='60' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400' y='106' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Change feed</text><text x='400' y='126' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>ordered per partition</text><line x1='500' y1='110' x2='560' y2='110' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='560' y='66' width='180' height='40' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='650.0' y='92.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Azure Functions</text><rect x='560' y='116' width='180' height='40' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='650.0' y='142.0' text-anchor='middle' fill='#ffffff' font-size='11.5' font-weight='600