<svg viewBox='0 0 800 212' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Embedding versus referencing data' font-family='Segoe UI,Arial,sans-serif'><title>Embedding versus referencing data</title><rect x='0' y='0' width='800' height='212' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Embedding vs referencing</text><text x='210' y='58' text-anchor='middle' fill='#0f6cbd' font-size='13.5' font-weight='700'>Embed (denormalize)</text><rect x='60' y='70' width='300' height='120' rx='10' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1.5'/><text x='80' y='96' text-anchor='start' fill='#1b2733' font-size='11.5' font-weight='400'>{ orderId, customer:{...},</text><text x='80' y='118' text-anchor='start' fill='#1b2733' font-size='11.5' font-weight='400'>  lines:[ {...}, {...} ] }</text><text x='210' y='150' text-anchor='middle' fill='#107c41' font-size='11.5' font-weight='600'>One read gets everything</text><text x='210' y='172' text-anchor='middle' fill='#5b6b7a' font-size='10' font-weight='400'>Best: read together, bounded, rarely changes</text><text x='600' y='58' text-anchor='middle' fill='#0b3d63' font-size='13.5' font-weight='700'>Reference (normalize)</text><rect x='450' y='70' width='140' height='44' rx='9' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='520.0' y='98.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>order</text><rect x='650' y='70' width='110' height='44' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='705.0' y='98.0' text-anchor='middle' fill='#ffffff' font-size='12' font-weight='600'>customer</text><rect x='450' y='132' width='140' height='44' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='520.0' y='160.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>lineItem</text><line x1='590' y1='92' x2='650' y2='92' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='520' y1='114' x2='520' y2='132' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><text x='600' y='196' text-anchor='middle' fill='#5b6b7a' font-size='10' font-weight='400'>Best: large, unbounded, or shared/updated data</text></svg>