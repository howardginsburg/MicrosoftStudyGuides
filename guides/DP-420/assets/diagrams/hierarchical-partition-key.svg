<svg viewBox='0 0 800 298' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Hierarchical partition key three levels' font-family='Segoe UI,Arial,sans-serif'><title>Hierarchical partition key three levels</title><rect x='0' y='0' width='800' height='298' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Hierarchical partition key (subpartitioning)</text><rect x='300' y='58' width='200' height='42' rx='9' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400.0' y='85.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>TenantId</text><line x1='360' y1='100' x2='250' y2='126' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='440' y1='100' x2='550' y2='126' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='150' y='128' width='200' height='40' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='250.0' y='154.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>UserId</text><rect x='450' y='128' width='200' height='40' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='550.0' y='154.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>UserId</text><line x1='250' y1='168' x2='250' y2='192' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='550' y1='168' x2='550' y2='192' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='150' y='194' width='200' height='40' rx='9' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='250.0' y='220.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>SessionId</text><rect x='450' y='194' width='200' height='40' rx='9' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='550.0' y='220.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>SessionId</text><text x='400' y='262' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Up to three levels — routes a query on the prefix to a subset of partitions</text><text x='400' y='282' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Lets a single logical-partition prefix exceed 20 GB across subpartitions</text></svg>