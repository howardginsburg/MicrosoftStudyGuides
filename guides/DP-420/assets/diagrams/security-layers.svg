<svg viewBox='0 0 800 316' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Network identity encryption field-level security' font-family='Segoe UI,Arial,sans-serif'><title>Network identity encryption field-level security</title><rect x='0' y='0' width='800' height='316' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Layers of Cosmos DB security</text><rect x='40.0' y='54' width='720' height='50' rx='9' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='400' y='76' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Network</text><text x='400' y='94' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>Firewall, VNet service endpoints, Private Link</text><rect x='100.0' y='114' width='600' height='50' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='400' y='136' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Identity &amp; access</text><text x='400' y='154' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>Control plane RBAC · data plane Entra ID · keys</text><rect x='160.0' y='174' width='480' height='50' rx='9' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400' y='196' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Encryption</text><text x='400' y='214' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>At rest (service or customer-managed keys) + in transit</text><rect x='220.0' y='234' width='360' height='50' rx='9' fill='#062338' stroke='none' stroke-width='1.5'/><text x='400' y='256' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Field-level</text><text x='400' y='274' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>Always Encrypted for sensitive properties</text><text x='400' y='300' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Combine layers for defense in depth