<svg viewBox='0 0 800 222' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Request unit cost model' font-family='Segoe UI,Arial,sans-serif'><title>Request unit cost model</title><rect x='0' y='0' width='800' height='222' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Request Units (RU/s) — the currency of throughput</text><text x='400' y='54' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Every operation costs RUs; provisioned RU/s is your per-second budget</text><rect x='40' y='80' width='175' height='72' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='127' y='108' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='700'>Point read (1 KB)</text><text x='127' y='130' text-anchor='middle' fill='#eaf3fb' font-size='12' font-weight='600'>~1 RU</text><rect x='225' y='80' width='175' height='72' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='312' y='108' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='700'>Query (indexed)</text><text x='312' y='130' text-anchor='middle' fill='#eaf3fb' font-size='12' font-weight='600'>few–many RU</text><rect x='410' y='80' width='175' height='72' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='497' y='108' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='700'>Create / replace</text><text x='497' y='130' text-anchor='middle' fill='#eaf3fb' font-size='12' font-weight='600'>~5+ RU</text><rect x='595' y='80' width='175' height='72' rx='10' fill='#b45309' stroke='none' stroke-width='1.5'/><text x='682' y='108' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='700'>Cross-partition query</text><text x='682' y='130' text-anchor='middle' fill='#eaf3fb' font-size='12' font-weight='600'>fan-out cost</text><rect x='60' y='170' width='680' height='34' rx='8' fill='#eaf3fb' stroke='#b45309'/><text x='400' y='192' text-anchor='middle' fill='#b45309' font-size='11.8' font-weight='600'>Exceed provisioned RU/s → request is rate-limited with HTTP 429 (retry after)</text></svg>