<svg viewBox='0 0 800 248' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Provisioned autoscale serverless free tier' font-family='Segoe UI,Arial,sans-serif'><title>Provisioned autoscale serverless free tier</title><rect x='0' y='0' width='800' height='248' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Choosing a throughput / capacity mode</text><rect x='30' y='52' width='176' height='44' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='118.0' y='70.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Provisioned</text><text x='118.0' y='89.0' text-anchor='middle' fill='#ffffff' font-size='11'>(manual)</text><rect x='30' y='100' width='176' height='44' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='118.0' y='126.0' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>Steady, predictable load</text><rect x='30' y='144' width='176' height='44' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='118.0' y='170.0' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>Set fixed RU/s</text><rect x='30' y='188' width='176' height='44' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='118.0' y='214.0' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>Billed for provisioned RU/s</text><rect x='218' y='52' width='176' height='44' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='306.0' y='70.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Provisioned</text><text x='306.0' y='89.0' text-anchor='middle' fill='#ffffff' font-size='11'>(autoscale)</text><rect x='218' y='100' width='176' height='44' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='306.0' y='126.0' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>Variable / spiky load</text><rect x='218' y='144' width='176' height='44' fill='#eaf3fb' stroke='#c9d6e2' stroke-wid