<svg viewBox='0 0 800 260' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Composite index for multi-property sort' font-family='Segoe UI,Arial,sans-serif'><title>Composite index for multi-property sort</title><rect x='0' y='0' width='800' height='260' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Composite index</text><rect x='230' y='60' width='340' height='50' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='400' y='82' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>ORDER BY category ASC, price DESC</text><text x='400' y='101' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>multi-property filter + sort</text><line x1='400' y1='110' x2='400' y2='140' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='230' y='142' width='340' height='50' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400' y='164' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='700'>Composite index (category, price)</text><text x='400' y='182' text-anchor='middle' fill='#eaf3fb' font-size='9.8' font-weight='400'>order &amp; direction must match the query</text><rect x='120' y='210' width='560' height='34' rx='8' fill='#eaf3fb' stroke='#b45309'/><text x='400' y='232' text-anchor='middle' fill='#b45309' font-size='11.5' font-weight='600'>Needed for multi-property ORDER BY and to cut RU on multi-filter queries</text></svg>