<svg viewBox='0 0 800 184' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Even distribution versus a hot partition' font-family='Segoe UI,Arial,sans-serif'><title>Even distribution versus a hot partition</title><rect x='0' y='0' width='800' height='184' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Partition key quality</text><text x='210' y='60' text-anchor='middle' fill='#107c41' font-size='13' font-weight='700'>Good — high cardinality, even</text><rect x='70' y='74' width='50' height='70' rx='6' fill='#3a9bdc'/><text x='95' y='115' text-anchor='middle' fill='#ffffff' font-size='11' font-weight='600'>25%</text><rect x='140' y='74' width='50' height='70' rx='6' fill='#3a9bdc'/><text x='165' y='115' text-anchor='middle' fill='#ffffff' font-size='11' font-weight='600'>25%</text><rect x='210' y='74' width='50' height='70' rx='6' fill='#3a9bdc'/><text x='235' y='115' text-anchor='middle' fill='#ffffff' font-size='11' font-weight='600'>25%</text><rect x='280' y='74' width='50' height='70' rx='6' fill='#3a9bdc'/><text x='305' y='115' text-anchor='middle' fill='#ffffff' font-size='11' font-weight='600'>25%</text><rect x='350' y='74' width='50' height='70' rx='6' fill='#3a9bdc'/><text x='375' y='115' text-anchor='middle' fill='#ffffff' font-size='11' font-weight='600'>25%</text><text x='210' y='164' text-anchor='middle' fill='#5b6b7a' font-size='11' font-weight='400'>Requests &amp; storage spread evenly</text><text x='600' y='60' text-anchor='middle' fill='#b45309' font-size='13' font-weight='700'>Bad — low cardinality, hot</text><rect x='470' y='14' width='40' height='130' rx='5' fill='#b45309'/><rect x='540' y='124' width='40' height='20' rx='5' fill='#9fb0bf'/><rect x='610' y='128' width='40' height='16' rx='5' fill='#9fb0bf'/><rect x='680' y='128' width='40' height='16' rx='5' fill='#9fb0bf'/><rect x='750' y='130' width='40' height='14' rx='5' fill='#9fb0bf'/><text x='600' y='164' text-anchor='middle' fill='#b45309' font-size='11' font-weight='600'>One &#x27;hot&#x27; partition throttles (429) while others idle</text></svg>