<svg viewBox='0 0 800 172' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Change feed denormalize referential aggregate archive' font-family='Segoe UI,Arial,sans-serif'><title>Change feed denormalize referential aggregate archive</title><rect x='0' y='0' width='800' height='172' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Change feed patterns</text><rect x='30' y='60' width='182' height='96' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='121' y='92' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Denormalize</text><text x='121' y='118' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>copy changes into a second container</text><rect x='220' y='60' width='182' height='96' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='311' y='92' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Referential</text><text x='311' y='118' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>validate/cascade related items</text><rect x='410' y='60' width='182' height='96' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='501' y='92' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Aggregate</text><text x='501' y='118' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>maintain running totals / reports</text><rect x='600' y='60' width='182' height='96' rx='10' fill='#5b6b7a' stroke='none' stroke-width='1.5'/><text x='691' y='92' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Archive</text><text x='691' y='118' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>write cold data to cheap storage</text></svg>