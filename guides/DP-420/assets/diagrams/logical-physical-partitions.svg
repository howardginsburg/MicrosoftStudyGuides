<svg viewBox='0 0 800 244' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Logical partitions map to physical partitions' font-family='Segoe UI,Arial,sans-serif'><title>Logical partitions map to physical partitions</title><rect x='0' y='0' width='800' height='244' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Logical and physical partitions</text><rect x='120' y='64' width='110' height='44' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='175.0' y='92.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>PK=A</text><rect x='270' y='64' width='110' height='44' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='325.0' y='92.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>PK=B</text><rect x='420' y='64' width='110' height='44' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='475.0' y='92.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>PK=C</text><rect x='570' y='64' width='110' height='44' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='625.0' y='92.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>PK=D</text><text x='400' y='128' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Logical partition = all items sharing one partition key value (max 20 GB)</text><rect x='120' y='150' width='260' height='56' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='250' y='174' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Physical partition 1</text><text x='250' y='193' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>hosts PK=A, PK=B</text><rect x='420' y='150' width='260' height='56' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='550' y='174' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Physical partition 2</text><text x='550' y='193' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>hosts PK=C, PK=D</text><line x1='175' y1='108' x2='230' y2='150' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='325' y1='108' x2='270' y2='150' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='475' y1='108' x2='530' y2='150' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='625' y1='108' x2='570' y2='150' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><text x='400' y='228' text-anchor='middle' fill='#5b6b7a' font-size='11.8' font-weight='400'>Cosmos DB maps logical partitions to physical partitions and splits them as data/RU grows</text></svg>