<svg viewBox='0 0 800 204' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Control plane and data plane RBAC' font-family='Segoe UI,Arial,sans-serif'><title>Control plane and data plane RBAC</title><rect x='0' y='0' width='800' height='204' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Control plane vs data plane access</text><rect x='70' y='66' width='300' height='120' rx='12' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='220' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Control plane</text><text x='220' y='114' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>manage the account/resources</text><rect x='90' y='128' width='260' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='220.0' y='147.0' text-anchor='middle' fill='#0b3d63' font-size='10.5' font-weight='600'>Azure RBAC · e.g. Cosmos DB Operator</text><text x='220' y='174' text-anchor='middle' fill='#5b6b7a' font-size='10' font-weight='400'>portal, ARM, keys, regions, firewall</text><rect x='430' y='66' width='300' height='120' rx='12' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='580' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Data plane</text><text x='580' y='114' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>read/write items in containers</text><rect x='450' y='128' width='260' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='580.0' y='147.0' text-anchor='middle' fill='#0b3d63' font-size='10' font-weight='600'>Cosmos DB data-plane RBAC (Entra ID)</text><text x='580' y='174' text-anchor='middle' fill='#5b6b7a' font-size='10' font-weight='400'>role definitions + assignments, no keys</text></svg>