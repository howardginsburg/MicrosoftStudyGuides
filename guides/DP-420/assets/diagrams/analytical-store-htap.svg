<svg viewBox='0 0 800 254' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Transactional and analytical store HTAP' font-family='Segoe UI,Arial,sans-serif'><title>Transactional and analytical store HTAP</title><rect x='0' y='0' width='800' height='254' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>HTAP: transactional + analytical store</text><rect x='90' y='66' width='260' height='60' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='220' y='90' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Transactional store</text><text x='220' y='110' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>row-based · RU-billed · OLTP</text><rect x='450' y='66' width='260' height='60' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='580' y='90' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Analytical store</text><text x='580' y='110' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>column-based · auto-sync · no RU</text><line x1='350' y1='96' x2='450' y2='96' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><text x='400' y='140' text-anchor='middle' fill='#0f6cbd' font-size='10.5' font-weight='600'>auto-sync (no ETL)</text><rect x='150' y='166' width='180' height='46' rx='9' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='240.0' y='195.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Synapse Spark</text><rect x='360' y='166' width='180' height='46' rx='9' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='450.0' y='195.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Synapse SQL</text><rect x='570' y='166' width='150' height='46' rx='9' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='645.0' y='195.0' text-anchor='middle' fill='#ffffff' font-size='12' font-weight='600'>Fabric mirror</text><line x1='580' y1='126' x2='450' y2='166' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><text x='400' y='238' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Queries on the analytical store don&#x27;t consume transactional RU/s</text></svg>