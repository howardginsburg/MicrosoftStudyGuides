<svg viewBox='0 0 800 220' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Synthetic partition key composition' font-family='Segoe UI,Arial,sans-serif'><title>Synthetic partition key composition</title><rect x='0' y='0' width='800' height='220' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Synthetic partition key</text><rect x='70' y='70' width='150' height='40' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='145.0' y='94.0' text-anchor='middle' fill='#0b3d63' font-size='12' font-weight='600'>deviceId: &#x27;D5&#x27;</text><text x='245' y='95' text-anchor='middle' fill='#5b6b7a' font-size='20' font-weight='700'>+</text><rect x='270' y='70' width='150' height='40' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='345.0' y='94.0' text-anchor='middle' fill='#0b3d63' font-size='12' font-weight='600'>date: &#x27;2026-07&#x27;</text><line x1='430' y1='90' x2='478' y2='90' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='480' y='66' width='250' height='48' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='605.0' y='96.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>pk = &#x27;D5-2026-07&#x27;</text><text x='400' y='150' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Concatenate fields (or add a random suffix) to raise cardinality and spread load</text><rect x='120' y='170' width='560' height='34' rx='8' fill='#eaf3fb' stroke='#c9d6e2'/><text x='400' y='192' text-anchor='middle' fill='#0b3d63' font-size='11.8' font-weight='600'>Turns a low-cardinality key into many evenly-loaded logical partitions</text></svg>