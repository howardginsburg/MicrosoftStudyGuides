<svg viewBox='0 0 800 196' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Time to live container and item level' font-family='Segoe UI,Arial,sans-serif'><title>Time to live container and item level</title><rect x='0' y='0' width='800' height='196' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Time to live (TTL)</text><rect x='60' y='70' width='220' height='54' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='170' y='94' text-anchor='middle' fill='#ffffff' font-size='12' font-weight='700'>Container DefaultTimeToLive</text><text x='170' y='112' text-anchor='middle' fill='#eaf3fb' font-size='9.8' font-weight='400'>-1 = on, no expiry · N = seconds</text><rect x='320' y='70' width='180' height='54' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='410' y='94' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='700'>Item ttl overrides</text><text x='410' y='112' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>per-document seconds</text><line x1='500' y1='97' x2='560' y2='97' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='560' y='70' width='180' height='54' rx='10' fill='#5b6b7a' stroke='none' stroke-width='1.5'/><text x='650' y='94' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Auto-delete</text><text x='650' y='112' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>uses leftover RU/s</text><rect x='100' y='146' width='600' height='34' rx='8' fill='#eaf3fb' stroke='#c9d6e2'/><text x='400' y='168' text-anchor='middle' fill='#0b3d63' font-size='11.8' font-weight='600'>Container TTL must be enabled for item-level ttl to take effect</text></svg>