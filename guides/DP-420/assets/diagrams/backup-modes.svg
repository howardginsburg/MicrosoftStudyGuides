<svg viewBox='0 0 800 278' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Periodic versus continuous backup' font-family='Segoe UI,Arial,sans-serif'><title>Periodic versus continuous backup</title><rect x='0' y='0' width='800' height='278' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Backup &amp; restore modes</text><rect x='90' y='52' width='294' height='38' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='237.0' y='77.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Periodic backup</text><rect x='90' y='94' width='294' height='42' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='237.0' y='119.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Snapshots every N hours</text><rect x='90' y='136' width='294' height='42' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='237.0' y='161.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Restore via support ticket</text><rect x='90' y='178' width='294' height='42' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='237.0' y='203.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Keeps a fixed # of copies</text><rect x='90' y='220' width='294' height='42' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='237.0' y='245.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Default on older accounts</text><rect x='400' y='52' width='294' height='38' rx='8' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='547.0' y='77.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Continuous backup</text><rect x='400' y='94' width='294' height='42' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='547.0' y='119.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Point-in-time restore (PITR)</text><rect x='400' y='136' width='294' height='42' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='547.0' y='161.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Self-service restore</text><rect x='400' y='178' width='294' height='42' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='547.0' y='203.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>7-day or 30-day retention</text><rect x='400' y='220' width='294' height='42' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='547.0' y='245.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Restore to any second</text></svg>