<svg viewBox='0 0 800 198' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Consistency levels spectrum' font-family='Segoe UI,Arial,sans-serif'><title>Consistency levels spectrum</title><rect x='0' y='0' width='800' height='198' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Five consistency levels</text><text x='120' y='54' text-anchor='middle' fill='#5b6b7a' font-size='10.5' font-weight='400'>Stronger · higher RU · higher latency</text><text x='690' y='54' text-anchor='end' fill='#5b6b7a' font-size='10.5' font-weight='400'>Weaker · lower RU · lower latency</text><rect x='30' y='72' width='140' height='72' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='100.0' y='104' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Strong</text><text x='100.0' y='136' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>linearizable</text><rect x='182' y='72' width='140' height='72' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='252.0' y='98' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Bounded</text><text x='252.0' y='116' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Staleness</text><text x='252.0' y='136' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>lag by K / t</text><rect x='334' y='72' width='140' height='72' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='404.0' y='104' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Session</text><text x='404.0' y='136' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>default; per-client</text><rect x='486' y='72' width='140' height='72' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='556.0' y='98' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Consistent</text><text x='556.0' y='116' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Prefix</text><text x='556.0' y='136' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>in-order</text><rect x='638' y='72' width='140' height='72' rx='10' fill='#5b6b7a' stroke='none' stroke-width='1.5'/><text x='708.0' y='104' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Eventual</text><text x='708.0' y='136' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>fastest</text><line x1='60' y1='158' x2='740' y2='158' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><text x='400' y='182' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Session is the default; each level trades guarantees against RU cost &amp; latency</text></svg>