<svg viewBox='0 0 800 290' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Single write region with global read replicas' font-family='Segoe UI,Arial,sans-serif'><title>Single write region with global read replicas</title><rect x='0' y='0' width='800' height='290' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Global (turnkey) distribution</text><rect x='320' y='60' width='160' height='48' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400.0' y='90.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Write region</text><text x='400' y='98' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>East US</text><rect x='120' y='180' width='150' height='46' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='195.0' y='209.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>West US</text><line x1='400' y1='108' x2='195' y2='180' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='340' y='180' width='150' height='46' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='415.0' y='209.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>North Europe</text><line x1='400' y1='108' x2='415' y2='180' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='560' y='180' width='150' height='46' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='635.0' y='209.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Southeast Asia</text><line x1='400' y1='108' x2='635' y2='180' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><text x='400' y='254' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Add/remove read regions with a click; data replicates automatically</text><text x='400' y='274' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Apps connect to the nearest region for low-latency reads</text></svg>