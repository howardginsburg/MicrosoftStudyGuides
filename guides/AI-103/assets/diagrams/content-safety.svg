<svg viewBox='0 0 800 242' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Content safety input and output filters' font-family='Segoe UI,Arial,sans-serif'><title>Content safety input and output filters</title><rect x='0' y='0' width='800' height='242' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker><marker id='ahg' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#107c41'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Content safety: input &amp; output filtering</text><rect x='30' y='70' width='150' height='50' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='105.0' y='101.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>User input</text><rect x='210' y='64' width='180' height='62' rx='10' fill='#b45309' stroke='none' stroke-width='1.5'/><text x='300.0' y='91.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Input filter</text><text x='300.0' y='110.0' text-anchor='middle' fill='#ffffff' font-size='10.5'>prompt shields</text><rect x='420' y='70' width='150' height='50' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='495.0' y='101.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Model</text><rect x='600' y='64' width='170' height='62' rx='10' fill='#b45309' stroke='none' stroke-width='1.5'/><text x='685.0' y='91.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Output filter</text><text x='685.0' y='110.0' text-anchor='middle' fill='#ffffff' font-size='10'>categories+severity</text><line x1='180' y1='95' x2='210' y2='95' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='390' y1='95' x2='420' y2='95' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='570' y1='95' x2='600' y2='95' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='40' y='160' width='118' height='30' rx='6' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='99.0' y='179.0' text-anchor='middle' fill='#0b3d63' font-size='11.5' font-weight='600'>Hate</text><rect x='164' y='160' width='118' height='30' rx='6' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='223.0' y='179.0' text-anchor='middle' fill='#0b3d63' font-size='11.5' font-weight='600'>Sexual</text><rect x='288' y='160' width='118' height='30' rx='6' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='347.0' y='179.0' text-anchor='middle' fill='#0b3d63' font-size='11.5' font-weight='600'>Violence</text><rect x='412' y='160' width='118' height='30' rx='6' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='471.0' y='179.0' text-anchor='middle' fill='#0b3d63' font-size='11.5' font-weight='600'>Self-harm</text><rect x='536' y='160' width='118' height='30' rx='6' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='595.0' y='179.0' text-anchor='middle' fill='#0b3d63' font-size='11.5' font-weight='600'>Jailbreak</text><rect x='660' y='160' width='118' height='30' rx='6' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='719.0' y='179.0' text-anchor='middle' fill='#0b3d63' font-size='11.5' font-weight='600'>Protected material</text><text x='400' y='224' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Filters screen both prompts and completions across categories at configurable severity thresholds</text></svg>