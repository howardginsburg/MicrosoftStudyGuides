<svg viewBox='0 0 800 264' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Function calling loop' font-family='Segoe UI,Arial,sans-serif'><title>Function calling loop</title><rect x='0' y='0' width='800' height='264' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker><marker id='ahg' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#107c41'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Function / tool calling loop</text><rect x='60' y='70' width='200' height='56' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='160.0' y='94.0' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='600'>Model</text><text x='160.0' y='113.0' text-anchor='middle' fill='#ffffff' font-size='10.5'>decides a tool is needed</text><rect x='540' y='70' width='200' height='56' rx='10' fill='#5c2d91' stroke='none' stroke-width='1.5'/><text x='640.0' y='94.0' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='600'>Your function</text><text x='640.0' y='113.0' text-anchor='middle' fill='#ffffff' font-size='10.5'>runs code / calls API</text><line x1='260' y1='88' x2='540' y2='88' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><text x='400' y='80' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='600'>1. tool call (name + JSON args)</text><line x1='540' y1='112' x2='260' y2='112' stroke='#107c41' stroke-width='2' marker-end='url(#ahg)'/><text x='400' y='132' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='600'>2. tool result returned to model</text><rect x='300' y='170' width='200' height='50' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400.0' y='191.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Final answer</text><text x='400.0' y='210.0' text-anchor='middle' fill='#ffffff' font-size='10.5'>grounded in results</text><line x1='160' y1='126' x2='360' y2='170' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><text x='400' y='246' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>The model emits structured tool calls; your app executes them and feeds results back to complete the answer</text></svg>