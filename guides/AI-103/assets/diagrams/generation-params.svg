<svg viewBox='0 0 800 328' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Generation parameters temperature top_p' font-family='Segoe UI,Arial,sans-serif'><title>Generation parameters temperature top_p</title><rect x='0' y='0' width='800' height='328' fill='#ffffff'/><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Tuning generation behavior</text><rect x='40' y='58' width='180' height='40' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='130.0' y='84.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>temperature</text><rect x='230' y='58' width='530' height='40' rx='8' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1.5'/><text x='248' y='83' text-anchor='start' fill='#1b2733' font-size='12.2' font-weight='500'>0 = deterministic → higher = more creative/random</text><rect x='40' y='106' width='180' height='40' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='130.0' y='132.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>top_p</text><rect x='230' y='106' width='530' height='40' rx='8' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1.5'/><text x='248' y='131' text-anchor='start' fill='#1b2733' font-size='12.2' font-weight='500'>nucleus sampling; lower = safer word choices</text><rect x='40' y='154' width='180' height='40' rx='8' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='130.0' y='180.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>max tokens</text><rect x='230' y='154' width='530' height='40' rx='8' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1.5'/><text x='248' y='179' text-anchor='start' fill='#1b2733' font-size='12.2' font-weight='500'>caps the length of the completion</text><rect x='40' y='202' width='180' height='40' rx='8' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='130.0' y='228.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>system prompt</text><rect x='230' y='202' width='530' height='40' rx='8' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1.5'/><text x='248' y='227' text-anchor='start' fill='#1b2733' font-size='12.2' font-weight='500'>sets role, tone, and guardrails</text><rect x='40' y='250' width='180' height='40' rx='8' fill='#5c2d91' stroke='none' stroke-width='1.5'/><text x='130.0' y='276.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>stop / seed</text><rect x='230' y='250' width='530' height='40' rx='8' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1.5'/><text x='248' y='275' text-anchor='start' fill='#1b2733' font-size='12.2' font-weight='500'>control termination and reproducibility</text><text x='400' y='310' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Prompt engineering plus parameter tuning shape determinism, length, and style</text></svg>