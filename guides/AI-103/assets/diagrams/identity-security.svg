00' height='52' rx='10' fill='#5c2d91' stroke='none' stroke-width='1.5'/><text x='660.0' y='172.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Private endpoints</text><text x='660.0' y='191.0' text-anchor='middle' fill='#ffffff' font-size='10'>traffic off public net</text><line x1='400' y1='110' x2='660' y2='150' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='300' y='232' width='200' height='52' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='400.0' y='254.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>RBAC role policies</text><text x='400.0' y='273.0' text-anchor='middle' fill='#ffffff' font-size='10'>least-privilege access</text><line x1='400' y1='110' x2='400' y2='232' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><text x='400' y='304' text-anchor='middle' fill='#5b6b7a' font-size='11' font-weight='400'>Prefer managed identity + Entra tokens (keyless), lock networking with private endpoints, scope RBAC tightly</text></svg>