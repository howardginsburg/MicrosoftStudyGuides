<svg viewBox='0 0 800 258' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Search indexer skillset index pipeline' font-family='Segoe UI,Arial,sans-serif'><title>Search indexer skillset index pipeline</title><rect x='0' y='0' width='800' height='258' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker><marker id='ahg' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#107c41'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Azure AI Search: indexing pipeline</text><rect x='30' y='80' width='150' height='50' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='105.0' y='101.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Data source</text><text x='105.0' y='120.0' text-anchor='middle' fill='#ffffff' font-size='10'>blobs, docs</text><rect x='210' y='80' width='150' height='50' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='285.0' y='101.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Indexer</text><text x='285.0' y='120.0' text-anchor='middle' fill='#ffffff' font-size='10'>pulls + tracks</text><rect x='390' y='80' width='160' height='50' rx='10' fill='#5c2d91' stroke='none' stroke-width='1.5'/><text x='470.0' y='101.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Skillset</text><text x='470.0' y='120.0' text-anchor='middle' fill='#ffffff' font-size='10'>OCR, split, embed</text><rect x='580' y='80' width='180' height='50' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='670.0' y='101.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Index</text><text x='670.0' y='120.0' text-anchor='middle' fill='#ffffff' font-size='10'>vectors + text fields</text><line x1='180' y1='105' x2='210' y2='105' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='360' y1='105' x2='390' y2='105' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='550' y1='105' x2='580' y2='105' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='300' y='168' width='200' height='46' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='400.0' y='197.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Query: hybrid + semantic</text><line x1='670' y1='130' x2='500' y2='168' stroke='#5b6b7a' stroke-width='2' stroke-dasharray='6 5' marker-end='url(#ah)'/><text x='400' y='240' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>An indexer runs a skillset to enrich and vectorize content into an index that serves hybrid search</text></svg>