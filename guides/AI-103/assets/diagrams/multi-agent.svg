<svg viewBox='0 0 800 268' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Multi-agent orchestrator and connected agents' font-family='Segoe UI,Arial,sans-serif'><title>Multi-agent orchestrator and connected agents</title><rect x='0' y='0' width='800' height='268' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker><marker id='ahg' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#107c41'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Multi-agent orchestration</text><rect x='310' y='60' width='180' height='54' rx='12' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400.0' y='83.0' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='600'>Orchestrator</text><text x='400.0' y='102.0' text-anchor='middle' fill='#ffffff' font-size='10.5'>main agent</text><rect x='60' y='168' width='180' height='50' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='150.0' y='199.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Retrieval agent</text><line x1='400' y1='114' x2='150' y2='168' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='150' y1='168' x2='400' y2='114' stroke='#5b6b7a' stroke-width='2' stroke-dasharray='6 5' marker-end='url(#ah)'/><rect x='310' y='168' width='180' height='50' rx='10' fill='#5c2d91' stroke='none' stroke-width='1.5'/><text x='400.0' y='199.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Analysis agent</text><line x1='400' y1='114' x2='400' y2='168' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='400' y1='168' x2='400' y2='114' stroke='#5b6b7a' stroke-width='2' stroke-dasharray='6 5' marker-end='url(#ah)'/><rect x='560' y='168' width='180' height='50' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='650.0' y='199.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Action agent</text><line x1='400' y1='114' x2='650' y2='168' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='650' y1='168' x2='400' y2='114' stroke='#5b6b7a' stroke-width='2' stroke-dasharray='6 5' marker-end='url(#ah)'/><text x='400' y='250' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>A lead agent delegates to connected specialist agents and composes their results</text></svg>