<svg viewBox='0 0 800 264' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='RAG retrieve augment generate flow' font-family='Segoe UI,Arial,sans-serif'><title>RAG retrieve augment generate flow</title><rect x='0' y='0' width='800' height='264' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker><marker id='ahg' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#107c41'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Retrieval-augmented generation (RAG)</text><rect x='30' y='66' width='168' height='60' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='114.0' y='102.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>User query</text><line x1='198' y1='96' x2='222' y2='96' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='222' y='66' width='168' height='60' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='306.0' y='92.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Retrieve</text><text x='306.0' y='111.0' text-anchor='middle' fill='#ffffff' font-size='11'>from index</text><line x1='390' y1='96' x2='414' y2='96' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='414' y='66' width='168' height='60' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='498.0' y='92.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Augment</text><text x='498.0' y='111.0' text-anchor='middle' fill='#ffffff' font-size='11'>prompt + context</text><line x1='582' y1='96' x2='606' y2='96' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='606' y='66' width='168' height='60' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='690.0' y='92.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Generate</text><text x='690.0' y='111.0' text-anchor='middle' fill='#ffffff' font-size='11'>grounded answer</text><rect x='150' y='168' width='220' height='50' rx='10' fill='#062338' stroke='none' stroke-width='1.5'/><text x='260.0' y='199.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Search index (vectors + text)</text><line x1='260' y1='168' x2='260' y2='128' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><text x='400' y='246' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Ground the model on your data: retrieve relevant chunks, add them to the prompt, then generate</text></svg>