<svg viewBox='0 0 800 296' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Responsible AI layered controls' font-family='Segoe UI,Arial,sans-serif'><title>Responsible AI layered controls</title><rect x='0' y='0' width='800' height='296' fill='#ffffff'/><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Responsible AI: layered controls</text><rect x='120' y='58' width='560' height='44' rx='9' fill='#b45309' stroke='none' stroke-width='1.5'/><text x='140' y='78' text-anchor='start' fill='#ffffff' font-size='13.5' font-weight='700'>Content safety filters</text><text x='140' y='95' text-anchor='start' fill='#eaf3fb' font-size='11' font-weight='400'>block harmful input/output</text><rect x='120' y='110' width='560' height='44' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='140' y='130' text-anchor='start' fill='#ffffff' font-size='13.5' font-weight='700'>Evaluators &amp; safety tests</text><text x='140' y='147' text-anchor='start' fill='#eaf3fb' font-size='11' font-weight='400'>measure groundedness &amp; risk</text><rect x='120' y='162' width='560' height='44' rx='9' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='140' y='182' text-anchor='start' fill='#ffffff' font-size='13.5' font-weight='700'>Auditing &amp; provenance</text><text x='140' y='199' text-anchor='start' fill='#eaf3fb' font-size='11' font-weight='400'>trace logs, approval workflows</text><rect x='120' y='214' width='560' height='44' rx='9' fill='#5c2d91' stroke='none' stroke-width='1.5'/><text x='140' y='234' text-anchor='start' fill='#ffffff' font-size='13.5' font-weight='700'>Agent oversight</text><text x='140' y='251' text-anchor='start' fill='#eaf3fb' font-size='11' font-weight='400'>constraints &amp; tool-access limits</text><text x='400' y='280' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Combine prevention, measurement, auditing, and human oversight across the lifecycle</text></svg>