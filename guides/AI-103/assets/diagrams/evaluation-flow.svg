<svg viewBox='0 0 800 244' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Evaluation metrics for generative apps' font-family='Segoe UI,Arial,sans-serif'><title>Evaluation metrics for generative apps</title><rect x='0' y='0' width='800' height='244' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker><marker id='ahg' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#107c41'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Evaluating generative apps</text><rect x='40' y='66' width='180' height='54' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='130.0' y='89.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Test dataset</text><text x='130.0' y='108.0' text-anchor='middle' fill='#ffffff' font-size='10.5'>queries + context</text><rect x='300' y='66' width='180' height='54' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='390.0' y='89.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>App / model</text><text x='390.0' y='108.0' text-anchor='middle' fill='#ffffff' font-size='10.5'>generates output</text><rect x='560' y='66' width='200' height='54' rx='10' fill='#5c2d91' stroke='none' stroke-width='1.5'/><text x='660.0' y='89.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Evaluators</text><text x='660.0' y='108.0' text-anchor='middle' fill='#ffffff' font-size='10.5'>score each response</text><line x1='220' y1='93' x2='300' y2='93' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='480' y1='93' x2='560' y2='93' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='40' y='160' width='140' height='34' rx='7' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='110.0' y='183.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Groundedness</text><rect x='188' y='160' width='140' height='34' rx='7' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='258.0' y='183.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Relevance</text><rect x='336' y='160' width='140' height='34' rx='7' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='406.0' y='183.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Coherence</text><rect x='484' y='160' width='140' height='34' rx='7' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='554.0' y='183.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Fluency</text><rect x='632' y='160' width='140' height='34' rx='7' fill='#b45309' stroke='none' stroke-width='1.5'/><text x='702.0' y='183.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Safety</text><text x='400' y='226' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Score outputs for groundedness/relevance/safety to catch fabrications before and after deployment</text></svg>