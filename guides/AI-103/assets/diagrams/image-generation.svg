<svg viewBox='0 0 800 250' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Image generation and inpainting editing' font-family='Segoe UI,Arial,sans-serif'><title>Image generation and inpainting editing</title><rect x='0' y='0' width='800' height='250' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker><marker id='ahg' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#107c41'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Image generation &amp; editing</text><rect x='40' y='70' width='170' height='50' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='125.0' y='91.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Text prompt</text><text x='125.0' y='110.0' text-anchor='middle' fill='#ffffff' font-size='10'>(+ reference img)</text><rect x='250' y='70' width='180' height='50' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='340.0' y='91.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Image model</text><text x='340.0' y='110.0' text-anchor='middle' fill='#ffffff' font-size='10'>size / quality / n</text><rect x='470' y='70' width='150' height='50' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='545.0' y='101.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Generated image</text><line x1='210' y1='95' x2='250' y2='95' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='430' y1='95' x2='470' y2='95' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='470' y='150' width='150' height='50' rx='10' fill='#5c2d91' stroke='none' stroke-width='1.5'/><text x='545.0' y='181.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Edited image</text><rect x='250' y='150' width='180' height='50' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='340.0' y='171.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Inpaint / mask</text><text x='340.0' y='190.0' text-anchor='middle' fill='#ffffff' font-size='10'>prompt-driven edit</text><line x1='545' y1='120' x2='545' y2='150' stroke='#107c41' stroke-width='2' marker-end='url(#ahg)'/><line x1='430' y1='175' x2='470' y2='175' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><text x='400' y='232' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Generate from prompts and reference media, then refine with mask-based inpainting and prompt edits</text></svg>