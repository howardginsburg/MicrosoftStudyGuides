<svg viewBox='0 0 800 368' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Hybrid search fusion and semantic rerank' font-family='Segoe UI,Arial,sans-serif'><title>Hybrid search fusion and semantic rerank</title><rect x='0' y='0' width='800' height='368' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker><marker id='ahg' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#107c41'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Hybrid search + semantic ranking</text><rect x='320' y='60' width='160' height='46' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400.0' y='89.0' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='600'>Query</text><rect x='120' y='140' width='200' height='50' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='220.0' y='161.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Keyword (BM25)</text><text x='220.0' y='180.0' text-anchor='middle' fill='#ffffff' font-size='10'>exact terms</text><rect x='480' y='140' width='200' height='50' rx='10' fill='#5c2d91' stroke='none' stroke-width='1.5'/><text x='580.0' y='161.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Vector (kNN)</text><text x='580.0' y='180.0' text-anchor='middle' fill='#ffffff' font-size='10'>semantic similarity</text><line x1='360' y1='106' x2='240' y2='140' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='440' y1='106' x2='560' y2='140' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='300' y='214' width='200' height='46' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='400.0' y='243.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Fuse (RRF)</text><line x1='220' y1='190' x2='360' y2='214' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='580' y1='190' x2='440' y2='214' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='300' y='282' width='200' height='44' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='400.0' y='310.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Semantic reranker</text><line x1='400' y1='260' x2='400' y2='282' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><text x='400' y='350' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Combine keyword and vector results, fuse with RRF, then re-rank the top hits for the best grounding</text></svg>