<svg viewBox='0 0 800 226' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Model Context Protocol connects Copilot to external tools' font-family='Segoe UI,Arial,sans-serif'><title>Model Context Protocol connects Copilot to external tools</title><rect x='0' y='0' width='800' height='226' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Model Context Protocol (MCP)</text><rect x='40' y='80' width='200' height='80' rx='11' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='140' y='110' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Copilot (MCP host)</text><text x='140' y='132' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>agent / chat client</text><rect x='320' y='60' width='150' height='50' rx='9' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='395.0' y='91.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>MCP server A</text><text x='395' y='96' text-anchor='middle' fill='#5b6b7a' font-size='10' font-weight='400'>e.g. GitHub tools</text><rect x='320' y='130' width='150' height='50' rx='9' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='395.0' y='161.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>MCP server B</text><text x='395' y='166' text-anchor='middle' fill='#5b6b7a' font-size='10' font-weight='400'>e.g. database / API</text><rect x='560' y='95' width='200' height='50' rx='9' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='660.0' y='126.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Tools / data / actions</text><line x1='240' y1='110' x2='320' y2='85' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='240' y1='130' x2='320' y2='155' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='470' y1='85' x2='560' y2='115' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='470' y1='155' x2='560' y2='125' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><text x='400' y='208' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>MCP is an open standard that lets Copilot call external tools and context sources</text></svg>