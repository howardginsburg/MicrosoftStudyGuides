<svg viewBox='0 0 800 206' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='GitHub Copilot request data flow' font-family='Segoe UI,Arial,sans-serif'><title>GitHub Copilot request data flow</title><rect x='0' y='0' width='800' height='206' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>How a Copilot request flows</text><rect x='30' y='72' width='175' height='66' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='117' y='100' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Editor / client</text><text x='117' y='120' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>context assembled</text><line x1='205' y1='105' x2='218' y2='105' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='218' y='72' width='175' height='66' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='305' y='100' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Copilot proxy</text><text x='305' y='120' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>filters &amp; safeguards</text><line x1='393' y1='105' x2='406' y2='105' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='406' y='72' width='175' height='66' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='493' y='100' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>LLM</text><text x='493' y='120' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>generates candidates</text><line x1='581' y1='105' x2='594' y2='105' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='594' y='72' width='175' height='66' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='681' y='100' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Post-processing</text><text x='681' y='120' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>filter, then return</text><text x='400' y='168' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Prompts are transient; the proxy applies filtering before and after the model</text><text x='400' y='188' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>Business/Enterprise: prompts &amp; suggestions are not retained to train the models</text></svg>