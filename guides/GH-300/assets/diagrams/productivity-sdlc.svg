<svg viewBox='0 0 800 178' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='GitHub Copilot across the SDLC' font-family='Segoe UI,Arial,sans-serif'><title>GitHub Copilot across the SDLC</title><rect x='0' y='0' width='800' height='178' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Copilot across the development lifecycle</text><rect x='24' y='70' width='140' height='60' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='94' y='96' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>Learn</text><text x='94' y='116' text-anchor='middle' fill='#eaf3fb' font-size='9.6' font-weight='400'>explain code &amp; APIs</text><line x1='164' y1='100' x2='178' y2='100' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='178' y='70' width='140' height='60' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='248' y='96' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>Write</text><text x='248' y='116' text-anchor='middle' fill='#eaf3fb' font-size='9.6' font-weight='400'>generate &amp; refactor</text><line x1='318' y1='100' x2='332' y2='100' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='332' y='70' width='140' height='60' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='402' y='96' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>Test</text><text x='402' y='116' text-anchor='middle' fill='#eaf3fb' font-size='9.6' font-weight='400'>unit &amp; edge-case tests</text><line x1='472' y1='100' x2='486' y2='100' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='486' y='70' width='140' height='60' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='556' y='96' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>Document</text><text x='556' y='116' text-anchor='middle' fill='#eaf3fb' font-size='9.6' font-weight='400'>comments &amp; docs</text><line x1='626' y1='100' x2='640' y2='100' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='640' y='70' width='140' height='60' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='710' y='96' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>Review</text><text x='710' y='116' text-anchor='middle' fill='#eaf3fb' font-size='9.6' font-weight='400'>PR summaries &amp; review</text><text x='400' y='158' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Fewer context switches; more time on design and problem solving</text></svg>