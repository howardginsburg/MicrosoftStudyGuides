<svg viewBox='0 0 800 196' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Copilot interaction modes in the IDE' font-family='Segoe UI,Arial,sans-serif'><title>Copilot interaction modes in the IDE</title><rect x='0' y='0' width='800' height='196' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Ways to interact with Copilot in the editor</text><rect x='30' y='58' width='182' height='96' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='121.0' y='86' text-anchor='middle' fill='#ffffff' font-size='13.2' font-weight='700'>Inline / ghost text</text><text x='121.0' y='110' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>autocomplete as you type</text><text x='121.0' y='128' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>Tab to accept</text><rect x='218' y='58' width='182' height='96' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='309.0' y='86' text-anchor='middle' fill='#ffffff' font-size='13.2' font-weight='700'>Chat</text><text x='309.0' y='110' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>ask questions, /commands</text><text x='309.0' y='128' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>conversational</text><rect x='406' y='58' width='182' height='96' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='497.0' y='86' text-anchor='middle' fill='#ffffff' font-size='13.2' font-weight='700'>Copilot Edits</text><text x='497.0' y='110' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>multi-file changes</text><text x='497.0' y='128' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>review a change set</text><rect x='594' y='58' width='182' height='96' rx='10' fill='#062338' stroke='none' stroke-width='1.5'/><text x='685.0' y='86' text-anchor='middle' fill='#ffffff' font-size='13.2' font-weight='700'>Agent Mode</text><text x='685.0' y='110' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>autonomous multi-step</text><text x='685.0' y='128' text-anchor='middle' fill='#eaf3fb' font-size='10.2' font-weight='400'>plans, edits, runs, iterates</text><text x='400' y='178' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Pick the lightest mode that fits the task; escalate to Agent Mode for larger work</text></svg>