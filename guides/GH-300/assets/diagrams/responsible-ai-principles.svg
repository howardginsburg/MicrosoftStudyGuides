<svg viewBox='0 0 800 244' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Six Microsoft responsible AI principles' font-family='Segoe UI,Arial,sans-serif'><title>Six Microsoft responsible AI principles</title><rect x='0' y='0' width='800' height='244' fill='#ffffff'/><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Microsoft&#x27;s responsible AI principles</text><rect x='40' y='58' width='240' height='70' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='160.0' y='88' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Fairness</text><text x='160.0' y='108' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>treat all people equitably</text><rect x='300' y='58' width='240' height='70' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='420.0' y='88' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Reliability &amp; safety</text><text x='420.0' y='108' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>perform safely &amp; consistently</text><rect x='560' y='58' width='240' height='70' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='680.0' y='88' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Privacy &amp; security</text><text x='680.0' y='108' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>protect data, respect consent</text><rect x='40' y='146' width='240' height='70' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='160.0' y='176' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Inclusiveness</text><text x='160.0' y='196' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>empower &amp; engage everyone</text><rect x='300' y='146' width='240' height='70' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='420.0' y='176' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Transparency</text><text x='420.0' y='196' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>understandable &amp; explainable</text><rect x='560' y='146' width='240' height='70' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='680.0' y='176' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Accountability</text><text x='680.0' y='196' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>people stay responsible</text></svg>