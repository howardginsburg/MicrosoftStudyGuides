<svg viewBox='0 0 800 298' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Structure of a good Copilot prompt' font-family='Segoe UI,Arial,sans-serif'><title>Structure of a good Copilot prompt</title><rect x='0' y='0' width='800' height='298' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Anatomy of an effective prompt</text><rect x='60' y='58' width='220' height='42' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='170.0' y='85.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Goal / intent</text><text x='300' y='84' text-anchor='start' fill='#1b2733' font-size='12' font-weight='400'>what you want done</text><rect x='60' y='112' width='220' height='42' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='170.0' y='139.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Context</text><text x='300' y='138' text-anchor='start' fill='#1b2733' font-size='12' font-weight='400'>files, language, constraints</text><rect x='60' y='166' width='220' height='42' rx='8' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='170.0' y='193.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Specifics</text><text x='300' y='192' text-anchor='start' fill='#1b2733' font-size='12' font-weight='400'>inputs, edge cases, style</text><rect x='60' y='220' width='220' height='42' rx='8' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='170.0' y='247.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Examples</text><text x='300' y='246' text-anchor='start' fill='#1b2733' font-size='12' font-weight='400'>sample in / out (few-shot)</text><text x='400' y='278' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Be clear and specific; give relevant context and break big asks into steps</text></svg>