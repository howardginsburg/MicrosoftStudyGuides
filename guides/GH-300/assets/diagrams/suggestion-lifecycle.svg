<svg viewBox='0 0 800 352' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='The lifecycle of a Copilot code suggestion' font-family='Segoe UI,Arial,sans-serif'><title>The lifecycle of a Copilot code suggestion</title><rect x='0' y='0' width='800' height='352' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Code suggestion lifecycle</text><rect x='60' y='64' width='300' height='44' rx='8' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='210' y='84' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Capture context</text><text x='210' y='101' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>open files, cursor, comments</text><line x1='210' y1='108' x2='210' y2='120' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='60' y='120' width='300' height='44' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='210' y='140' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Build prompt</text><text x='210' y='157' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>assemble &amp; trim to fit</text><line x1='210' y1='164' x2='210' y2='176' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='60' y='176' width='300' height='44' rx='8' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='210' y='196' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Model inference</text><text x='210' y='213' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>generate candidates</text><line x1='210' y1='220' x2='210' y2='232' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='60' y='232' width='300' height='44' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='210' y='252' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Filter</text><text x='210' y='269' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>safety &amp; public-code match</text><line x1='210' y1='276' x2='210' y2='288' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='60' y='288' width='300' height='44' rx='8' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='210' y='308' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Show suggestion</text><text x='210' y='325' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>you accept or reject</text><rect x='400' y='120' width='340' height='44' rx='6' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='570.0' y='146.0' text-anchor='middle' fill='#0b3d63' font-size='12' font-weight='600'>Accepted code becomes yours to review, test, and own</text></svg>