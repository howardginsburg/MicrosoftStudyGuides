<svg viewBox='0 0 800 220' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='GitHub Copilot CLI request and approval flow' font-family='Segoe UI,Arial,sans-serif'><title>GitHub Copilot CLI request and approval flow</title><rect x='0' y='0' width='800' height='220' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>GitHub Copilot in the terminal (CLI)</text><rect x='40' y='80' width='150' height='60' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='115.0' y='116.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>You ask</text><text x='115' y='150' text-anchor='middle' fill='#5b6b7a' font-size='10.5' font-weight='400'>natural language</text><rect x='250' y='80' width='180' height='60' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='340.0' y='116.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Copilot CLI</text><text x='340' y='150' text-anchor='middle' fill='#5b6b7a' font-size='10.5' font-weight='400'>suggests / explains</text><rect x='490' y='80' width='130' height='60' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='555.0' y='116.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>You review</text><rect x='660' y='80' width='110' height='60' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='715.0' y='116.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Run</text><line x1='190' y1='110' x2='250' y2='110' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='430' y1='110' x2='490' y2='110' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='620' y1='110' x2='660' y2='110' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='120' y='170' width='560' height='34' rx='7' fill='#eaf3fb' stroke='#b45309'/><text x='400' y='192' text-anchor='middle' fill='#b45309' font-size='11.5' font-weight='600'>Nothing runs until you confirm — the command is only executed after you approve it</text></svg>