<svg viewBox='0 0 800 232' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Common limitations of generative AI tools' font-family='Segoe UI,Arial,sans-serif'><title>Common limitations of generative AI tools</title><rect x='0' y='0' width='800' height='232' fill='#ffffff'/><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Limitations of generative AI to plan for</text><rect x='40' y='58' width='240' height='56' rx='9' fill='#eaf3fb' stroke='#b45309' stroke-width='1.3'/><text x='160.0' y='82' text-anchor='middle' fill='#b45309' font-size='13.5' font-weight='700'>Hallucination</text><text x='160.0' y='101' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>plausible but wrong output</text><rect x='300' y='58' width='240' height='56' rx='9' fill='#eaf3fb' stroke='#b45309' stroke-width='1.3'/><text x='420.0' y='82' text-anchor='middle' fill='#b45309' font-size='13.5' font-weight='700'>Bias</text><text x='420.0' y='101' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>reflects biased training data</text><rect x='560' y='58' width='240' height='56' rx='9' fill='#eaf3fb' stroke='#b45309' stroke-width='1.3'/><text x='680.0' y='82' text-anchor='middle' fill='#b45309' font-size='13.5' font-weight='700'>Stale knowledge</text><text x='680.0' y='101' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>cutoff / no live context</text><rect x='40' y='130' width='240' height='56' rx='9' fill='#eaf3fb' stroke='#b45309' stroke-width='1.3'/><text x='160.0' y='154' text-anchor='middle' fill='#b45309' font-size='13.5' font-weight='700'>No true reasoning</text><text x='160.0' y='173' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>predicts likely tokens</text><rect x='300' y='130' width='240' height='56' rx='9' fill='#eaf3fb' stroke='#b45309' stroke-width='1.3'/><text x='420.0' y='154' text-anchor='middle' fill='#b45309' font-size='13.5' font-weight='700'>Security risks</text><text x='420.0' y='173' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>may suggest vulnerable code</text><rect x='560' y='130' width='240' height='56' rx='9' fill='#eaf3fb' stroke='#b45309' stroke-width='1.3'/><text x='680.0' y='154' text-anchor='middle' fill='#b45309' font-size='13.5' font-weight='700'>IP / matching</text><text x='680.0' y='173' text-anchor='middle' fill='#1b2733' font-size='10.8' font-weight='400'>may echo public code</text><text x='400' y='214' text-anchor='middle' fill='#5b6b7a' font-size='12.5' font-weight='400'>Human review is required — Copilot assists, it does not decide</text></svg>