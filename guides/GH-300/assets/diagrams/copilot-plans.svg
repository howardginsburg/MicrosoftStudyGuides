<svg viewBox='0 0 800 196' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='GitHub Copilot plan tiers' font-family='Segoe UI,Arial,sans-serif'><title>GitHub Copilot plan tiers</title><rect x='0' y='0' width='800' height='196' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>GitHub Copilot plans</text><rect x='40' y='60' width='180' height='92' rx='11' fill='#5b6b7a' stroke='none' stroke-width='1.5'/><text x='130.0' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Free</text><text x='130.0' y='116' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>limited monthly</text><text x='130.0' y='133' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>completions &amp; chat</text><rect x='228' y='60' width='180' height='92' rx='11' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='318.0' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Pro / Pro+</text><text x='318.0' y='116' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>full individual</text><text x='318.0' y='133' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>features</text><rect x='416' y='60' width='180' height='92' rx='11' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='506.0' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Business</text><text x='506.0' y='116' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>org policy &amp;</text><text x='506.0' y='133' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>management</text><rect x='604' y='60' width='180' height='92' rx='11' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='694.0' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Enterprise</text><text x='694.0' y='116' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>knowledge bases,</