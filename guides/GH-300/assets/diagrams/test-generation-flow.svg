<svg viewBox='0 0 800 186' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Test generation workflow with Copilot' font-family='Segoe UI,Arial,sans-serif'><title>Test generation workflow with Copilot</title><rect x='0' y='0' width='800' height='186' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Generating tests with Copilot</text><rect x='40' y='72' width='170' height='64' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='125' y='99' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Select code</text><text x='125' y='119' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>function under test</text><line x1='210' y1='104' x2='222' y2='104' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='222' y='72' width='170' height='64' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='307' y='99' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Ask for tests</text><text x='307' y='119' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>/tests or chat</text><line x1='392' y1='104' x2='404' y2='104' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='404' y='72' width='170' height='64' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='489' y='99' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Review cases</text><text x='489' y='119' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>happy path + edges</text><line x1='574' y1='104' x2='586' y2='104' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='586' y='72' width='170' height='64' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='671' y='99' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='700'>Run &amp; refine</text><text x='671' y='119' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>fix gaps, add asserts</text><text x='400' y='166' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Always run generated tests; verify they assert real behavior, not just pass</text></svg>