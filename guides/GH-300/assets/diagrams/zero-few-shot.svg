<svg viewBox='0 0 800 234' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Zero-shot versus few-shot prompting' font-family='Segoe UI,Arial,sans-serif'><title>Zero-shot versus few-shot prompting</title><rect x='0' y='0' width='800' height='234' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Zero-shot vs few-shot prompting</text><rect x='50' y='66' width='330' height='130' rx='12' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='215' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Zero-shot</text><rect x='70' y='108' width='290' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='215.0' y='127.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>instruction only, no examples</text><rect x='70' y='146' width='290' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='215.0' y='165.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>fast; good for simple tasks</text><rect x='420' y='66' width='330' height='130' rx='12' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='585' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Few-shot</text><rect x='440' y='108' width='290' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='585.0' y='127.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>include 1–few input/output examples</text><rect x='440' y='146' width='290' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='585.0' y='165.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>steers format &amp; style; better for complex</text><text x='400' y='216' text-anchor='middle' fill='#5b6b7a' font-size='12.5' font-weight='400'>Add examples when you need a specific pattern or output shape</text></svg>