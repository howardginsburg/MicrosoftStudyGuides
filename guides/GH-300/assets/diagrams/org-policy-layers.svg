<svg viewBox='0 0 800 306' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Organization-wide Copilot management layers' font-family='Segoe UI,Arial,sans-serif'><title>Organization-wide Copilot management layers</title><rect x='0' y='0' width='800' height='306' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Organization management &amp; policy</text><rect x='120' y='64' width='560' height='44' rx='9' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='250' y='91' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Enterprise policies</text><text x='560' y='91' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>set defaults for all orgs</text><rect x='120' y='118' width='560' height='44' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='250' y='145' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Organization settings</text><text x='560' y='145' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>features, exclusions, seats</text><rect x='120' y='172' width='560' height='44' rx='9' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='250' y='199' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Audit log</text><text x='560' y='199' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>who did what, when</text><rect x='120' y='226' width='560' height='44' rx='9' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='250' y='253' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>REST API</text><text x='560' y='253' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>manage seats &amp; subscriptions</text><text x='400' y='286' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Admins govern access, enforce policies, and monitor usage centrally</text></svg>