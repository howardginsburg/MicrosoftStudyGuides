<svg viewBox='0 0 800 196' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Copilot-assisted pull request review' font-family='Segoe UI,Arial,sans-serif'><title>Copilot-assisted pull request review</title><rect x='0' y='0' width='800' height='196' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Copilot code review</text><rect x='40' y='80' width='160' height='60' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='120.0' y='116.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Pull request</text><rect x='240' y='80' width='180' height='60' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='330.0' y='116.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Copilot reviews</text><text x='330' y='152' text-anchor='middle' fill='#5b6b7a' font-size='10' font-weight='400'>finds issues, suggests fixes</text><rect x='460' y='80' width='150' height='60' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='535.0' y='116.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>You decide</text><rect x='650' y='80' width='110' height='60' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='705.0' y='116.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Merge</text><line x1='200' y1='110' x2='240' y2='110' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='420' y1='110' x2='460' y2='110' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><line x1='610' y1='110' x2='650' y2='110' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><text x='400' y='176' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Copilot review augments — human reviewers still approve the change</text></svg>