<svg viewBox='0 0 800 188' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Human-in-the-loop validation of AI output' font-family='Segoe UI,Arial,sans-serif'><title>Human-in-the-loop validation of AI output</title><rect x='0' y='0' width='800' height='188' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Validate every suggestion (human in the loop)</text><rect x='60' y='70' width='150' height='66' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='135' y='98' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Copilot</text><text x='135' y='118' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>suggests</text><line x1='210' y1='103' x2='238' y2='103' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='238' y='70' width='150' height='66' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='313' y='98' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Read &amp;</text><text x='313' y='118' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>understand</text><line x1='388' y1='103' x2='416' y2='103' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='416' y='70' width='150' height='66' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='491' y='98' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Test &amp;</text><text x='491' y='118' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>verify</text><line x1='566' y1='103' x2='594' y2='103' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='594' y='70' width='150' height='66' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='669' y='98' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>Accept /</text><text x='669' y='118' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='700'>edit / reject</text><text x='400' y='168' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>You remain accountable for correctness, security, and licensing of accepted code</text></svg>