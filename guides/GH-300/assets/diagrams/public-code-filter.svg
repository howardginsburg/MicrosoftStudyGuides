<svg viewBox='0 0 800 214' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Public code matching filter' font-family='Segoe UI,Arial,sans-serif'><title>Public code matching filter</title><rect x='0' y='0' width='800' height='214' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Suggestions matching public code</text><rect x='40' y='84' width='170' height='58' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='125.0' y='119.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Candidate
