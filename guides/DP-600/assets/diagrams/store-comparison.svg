<svg viewBox='0 0 800 300' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Lakehouse vs warehouse vs eventhouse comparison' font-family='Segoe UI,Arial,sans-serif'><title>Lakehouse vs warehouse vs eventhouse comparison</title><rect x='0' y='0' width='800' height='300' fill='#ffffff'/><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Choosing a Fabric data store</text><text x='40' y='102.0' text-anchor='start' fill='#0b3d63' font-size='12.5' font-weight='700'>Best for</text><text x='40' y='154.0' text-anchor='start' fill='#0b3d63' font-size='12.5' font-weight='700'>Query language</text><text x='40' y='206.0' text-anchor='start' fill='#0b3d63' font-size='12.5' font-weight='700'>Write pattern</text><text x='40' y='258.0' text-anchor='start' fill='#0b3d63' font-size='12.5' font-weight='700'>Storage</text><rect x='210' y='58' width='178' height='34' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='299.0' y='81.0' text-anchor='middle' fill='#ffffff' font-size='17' font-weight='600'>Lakehouse</text><rect x='210' y='92' width='178' height='52' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='299.0' y='122.0' text-anchor='middle' fill='#1b2733' font-size='11.8' font-weight='400'>Mixed / unstructured</text><rect x='210' y='144' width='178' height='52' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='299.0' y='174.0' text-anchor='middle' fill='#1b2733' font-size='11.8' font-weight='400'>Spark + read-only T-SQL</text><rect x='210' y='196' width='178' height='52' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='299.0' y='226.0' text-anchor='middle' fill='#1b2733' font-size='11.8' font-weight='400'>Notebooks, Dataflows</text><rect x='210' y='248' width='178' height='52' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='299.0' y='278.0' text-anchor='middle' fill='#1b2733' font-size='11.8' font-weight='400'>Delta in OneLake</text><rect x='400' y='58' width='178' height='34' rx='