<svg viewBox='0 0 800 336' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Composite model mixes storage modes' font-family='Segoe UI,Arial,sans-serif'><title>Composite model mixes storage modes</title><rect x='0' y='0' width='800' height='336' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Composite model</text><rect x='300' y='64' width='200' height='50' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400.0' y='95.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>One semantic model</text><rect x='110' y='180' width='150' height='46' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='185.0' y='209.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Import</text><line x1='185' y1='180' x2='400' y2='114' stroke='#5b6b7a' stroke-width='2' stroke-dasharray='6 5' marker-end='url(#ah)'/><rect x='330' y='180' width='150' height='46' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='405.0' y='209.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Direct Lake</text><line x1='405' y1='180' x2='400' y2='114' stroke='#5b6b7a' stroke-width='2' stroke-dasharray='6 5' marker-end='url(#ah)'/><rect x='550' y='180' width='150' height='46' rx='8' fill='#5b6b7a' stroke='none' stroke-width='1.5'/><text x='625.0' y='209.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>DirectQuery</text><line x1='625' y1='180' x2='400' y2='114' stroke='#5b6b7a' stroke-width='2' stroke-dasharray='6 5' marker-end='url(#ah)'/><rect x='330' y='250' width='150' height='44' rx='8' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='405.0' y='278.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Dual</text><text x='405' y='284' text-anchor='middle' fill='#ffffff' font-size='10' font-weight='400'>(Import + DirectQuery)</text><text x='400' y='318' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Mix storage modes per table; Dual lets the engine pick the cheapest path</text></svg>