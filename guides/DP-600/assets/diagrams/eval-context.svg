<svg viewBox='0 0 800 250' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Row context versus filter context in DAX' font-family='Segoe UI,Arial,sans-serif'><title>Row context versus filter context in DAX</title><rect x='0' y='0' width='800' height='250' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>DAX evaluation context</text><rect x='50' y='60' width='330' height='150' rx='12' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='215' y='88' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Row context</text><text x='215' y='110' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='400'>&#x27;current row&#x27; during iteration</text><rect x='80' y='126' width='270' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='215.0' y='145.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>calculated columns · SUMX / iterators</text><rect x='80' y='164' width='270' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='215.0' y='183.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>one row at a time</text><rect x='420' y='60' width='330' height='150' rx='12' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='585' y='88' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Filter context</text><text x='585' y='110' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='400'>&#x27;which rows are visible&#x27;</text><rect x='450' y='126' width='270' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='585.0' y='145.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>slicers · relationships · CALCULATE</text><rect x='450' y='164' width='270' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='585.0' y='183.0' text-anchor='middle' fill='#0b3d63' font-size='11' font-weight='600'>the set the measure sees</text><text x='400' y='232' text-anchor='middle' fill='#5b6b7a' font-size='12.5' font-weight='400'>CALCULATE transitions row → filter context and overrides filters</text></svg>