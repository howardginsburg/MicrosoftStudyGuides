<svg viewBox='0 0 800 224' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Calculation groups reduce measure sprawl' font-family='Segoe UI,Arial,sans-serif'><title>Calculation groups reduce measure sprawl</title><rect x='0' y='0' width='800' height='224' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Calculation groups</text><text x='200' y='64' text-anchor='middle' fill='#b45309' font-size='13' font-weight='700'>Without</text><rect x='60' y='78' width='280' height='32' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='200.0' y='98.0' text-anchor='middle' fill='#1b2733' font-size='11' font-weight='600'>Revenue, Revenue YTD, Revenue PY …</text><rect x='60' y='116' width='280' height='32' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='200.0' y='136.0' text-anchor='middle' fill='#1b2733' font-size='11' font-weight='600'>Cost, Cost YTD, Cost PY …</text><text x='200' y='168' text-anchor='middle' fill='#5b6b7a' font-size='11' font-weight='400'>measures × patterns = explosion</text><rect x='430' y='74' width='140' height='44' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='500.0' y='102.0' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Base measures</text><rect x='430' y='140' width='140' height='44' rx='8' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='500.0' y='168.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Calc group</text><text x='500' y='204' text-anchor='middle' fill='#5b6b7a' font-size='11' font-weight='400'>Current / YTD / PY</text><line x1='500' y1='118' x2='500' y2='140' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><text x='690' y='110' text-anchor='middle' fill='#0b3d63' font-size='12' font-weight='600'>One set of</text><text x='690' y='128' text-anchor='middle' fill='#0b3d63' font-size='12' font-weight='600'>time patterns</text><text x='690' y='150' text-anchor='middle' fill='#5b6b7a' font-size='11' font-weight='400'>applies to ALL</text><text x='690' y='166' text-anchor='middle' fill='#5b6b7a' font-size='11' font-weight='400'>measures</text><line x1='575' y1='162' x2='650' y2='150' stroke='#0f6cbd' stroke-width='2' stroke-dasharray='6 5' marker-end='url(#ahb)'/></svg>