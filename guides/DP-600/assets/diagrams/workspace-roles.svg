<svg viewBox='0 0 800 296' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Workspace role hierarchy' font-family='Segoe UI,Arial,sans-serif'><title>Workspace role hierarchy</title><rect x='0' y='0' width='800' height='296' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Workspace roles (most → least privilege)</text><rect x='80.0' y='56' width='640' height='48' rx='8' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='96.0' y='86' text-anchor='start' fill='#ffffff' font-size='14.5' font-weight='700'>Admin</text><text x='704.0' y='86' text-anchor='end' fill='#eaf3fb' font-size='11.5' font-weight='400'>Full control + manage access &amp; settings</text><rect x='115.0' y='114' width='570' height='48' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='131.0' y='144' text-anchor='start' fill='#ffffff' font-size='14.5' font-weight='700'>Member</text><text x='669.0' y='144' text-anchor='end' fill='#eaf3fb' font-size='11.5' font-weight='400'>Add members, share, edit all items</text><rect x='150.0' y='172' width='500' height='48' rx='8' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='166.0' y='202' text-anchor='start' fill='#ffffff' font-size='14.5' font-weight='700'>Contributor</text><text x='634.0' y='202' text-anchor='end' fill='#eaf3fb' font-size='11.5' font-weight='400'>Create and edit items</text><rect x='185.0' y='230' width='430' height='48' rx='8' fill='#5b6b7a' stroke='none' stroke-width='1.5'/><text x='201.0' y='260' text-anchor='start' fill='#ffffff' font-size='14.5' font-weight='700'>Viewer</text><text x='599.0' y='260' text-anchor='end' fill='#eaf3fb' font-size='11.5' font-weight='400'>Read / consume only</text></svg>