<svg viewBox='0 0 800 190' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Endorsement tiers promoted certified master data' font-family='Segoe UI,Arial,sans-serif'><title>Endorsement tiers promoted certified master data</title><rect x='0' y='0' width='800' height='190' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Endorsement — trust signals</text><rect x='40' y='66' width='230' height='80' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='155' y='98' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Promoted</text><text x='155' y='122' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Any contributor can set — team-ready</text><line x1='270' y1='106' x2='290' y2='106' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='290' y='66' width='230' height='80' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='405' y='98' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Certified</text><text x='405' y='122' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Authorized reviewers — org gold standard</text><line x1='520' y1='106' x2='540' y2='106' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='540' y='66' width='230' height='80' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='655' y='98' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Master data</text><text x='655' y='122' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Authoritative single source of truth</text><text x='400'