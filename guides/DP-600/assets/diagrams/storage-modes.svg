<svg viewBox='0 0 800 206' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Import DirectQuery Direct Lake Dual Composite storage modes' font-family='Segoe UI,Arial,sans-serif'><title>Import DirectQuery Direct Lake Dual Composite storage modes</title><rect x='0' y='0' width='800' height='206' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Semantic model storage modes</text><rect x='40' y='64' width='175' height='96' rx='10' fill='#107c41' stroke='none' stroke-width='1.5'/><text x='127' y='96' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Import</text><text x='127' y='122' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Cached copy in memory</text><text x='127' y='142' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>Fastest; scheduled refresh</text><rect x='225' y='64' width='175' height='96' rx='10' fill='#b45309' stroke='none' stroke-width='1.5'/><text x='312' y='96' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>DirectQuery</text><text x='312' y='122' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Live query to source</text><text x='312' y='142' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>Always current; slower</text><rect x='410' y='64' width='175' height='96' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='497' y='96' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Direct Lake</text><text x='497' y='122' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Reads OneLake Delta</text><text x='497' y='142' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>Import speed + fresh</text><rect x='595' y='64' width='175' height='96' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='682' y='96' text-anchor='middle' fill='#ffffff' font-size='14.5' font-weight='700'>Dual / Composite</text><text x='682' y='122' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Mix modes per table</text><text x='682' y='142' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>Engine picks best path</text><text x='400' y='186' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Storage mode is set per table — it drives freshness, speed, cost, and features</text></svg>