<svg viewBox='0 0 800 214' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Incremental refresh partitions with RangeStart RangeEnd' font-family='Segoe UI,Arial,sans-serif'><title>Incremental refresh partitions with RangeStart RangeEnd</title><rect x='0' y='0' width='800' height='214' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Incremental refresh</text><text x='400' y='54' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>RangeStart / RangeEnd parameters partition the table by date</text><rect x='60' y='80' width='120' height='54' rx='8' fill='#9fb0bf' stroke='none' stroke-width='1.5'/><text x='120' y='104' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>2019</text><text x='120' y='123' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>archived</text><rect x='194' y='80' width='120' height='54' rx='8' fill='#9fb0bf' stroke='none' stroke-width='1.5'/><text x='254' y='104' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>2020</text><text x='254' y='123' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>archived</text><rect x='328' y='80' width='120' height='54' rx='8' fill='#9fb0bf' stroke='none' stroke-width='1.5'/><text x='388' y='104' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>2021</text><text x='388' y='123' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>archived</text><rect x='462' y='80' width='120' height='54' rx='8' fill='#9fb0bf' stroke='none' stroke-width='1.5'/><text x='522' y='104' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>2022</text><text x='522' y='123' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>archived</text><rect x='596' y='80' width='120' height='54' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='656' y='104' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>2023</text><text x='656' y='123' text-anchor='middle' fill='#eaf3fb' font-size='10.5' font-weight='400'>refresh</text><rect x='46' y='72' width='548' height='70' rx='10' fill='none' stroke='#5b6b7a' stroke-dasharray='5 4'/><text x='300' y='164' text-anchor='middle' fill='#5b6b7a' font-size='11' font-weight='400'>Stored (archive) period — not refreshed</text><rect x='596' y='72' width='140' height='70' rx='10' fill='none' stroke='#0f6cbd' stroke-width='2'/><text x='666' y='164' text-anchor='middle' fill='#0f6cbd' font-size='11' font-weight='600'>Incremental window</text><text x='400' y='196' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Only recent partitions refresh — requires query folding on the source</text></svg>