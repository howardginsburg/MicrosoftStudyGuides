<svg viewBox='0 0 800 336' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Direct Lake architecture and DirectQuery fallback' font-family='Segoe UI,Arial,sans-serif'><title>Direct Lake architecture and DirectQuery fallback</title><rect x='0' y='0' width='800' height='336' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='300' y='30' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Direct Lake architecture</text><rect x='90' y='58' width='420' height='58' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='300' y='82' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Lakehouse / Warehouse</text><text x='300' y='101' text-anchor='middle' fill='#eaf3fb' font-size='12' font-weight='400'>Delta Parquet tables in OneLake</text><line x1='300' y1='116' x2='300' y2='150' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='90' y='152' width='420' height='58' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='300' y='176' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Direct Lake engine</text><text x='300' y='195' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='400'>Loads columns on demand — no copy, no translation</text><line x1='300' y1='210' x2='300' y2='244' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><rect x='90' y='246' width='420' height='50' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='300.0' y='277.0' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='600'>Semantic model → reports</text><rect x='545' y='150' width='210' height='108' rx='10' fill='#eaf3fb' stroke='#b45309' stroke-width='