<svg viewBox='0 0 800 224' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Query folding pushes transforms to the source' font-family='Segoe UI,Arial,sans-serif'><title>Query folding pushes transforms to the source</title><rect x='0' y='0' width='800' height='224' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Query folding</text><rect x='60' y='70' width='180' height='60' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='150.0' y='106.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Power Query steps</text><rect x='320' y='70' width='180' height='60' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='410.0' y='106.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Folded to SQL</text><rect x='580' y='70' width='160' height='60' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='660.0' y='106.0' text-anchor='middle' fill='#ffffff' font-size='13.5' font-weight='600'>Source database</text><line x1='240' y1='100' x2='320' y2='100' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='500' y1='100' x2='580' y2='100' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><text x='400' y='158' text-anchor='middle' fill='#5b6b7a' font-size='12.5' font-weight='400'>Transforms are pushed to the source — less data moved, faster refresh</text><rect x='150' y='178' width='500' height='32' rx='6' fill='#eaf3fb' stroke='#b45309'/><text x='400' y='199' text-anchor='middle' fill='#b45309' font-size='11.5' font-weight='600'>Break folding (e.g. some custom steps) → all rows pulled locally = slow</text></svg>