<svg viewBox='0 0 800 240' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='RLS filters a dimension and propagates to the fact table' font-family='Segoe UI,Arial,sans-serif'><title>RLS filters a dimension and propagates to the fact table</title><rect x='0' y='0' width='800' height='240' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>How row-level security filters data</text><rect x='70' y='70' width='220' height='70' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='180' y='98' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>RLS role filter</text><text x='180' y='118' text-anchor='middle' fill='#eaf3fb' font-size='12' font-weight='400'>[Region] = &quot;West&quot;</text><rect x='300' y='70' width='180' height='70' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='390.0' y='111.0' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='600'>Dim_Region</text><rect x='510' y='70' width='220' height='70' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='620' y='98' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>Fact_Sales</text><text x='620' y='118' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>filtered via relationship</text><line x1='290' y1='105' x2='300' y2='105' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><line x1='480' y1='105' x2='510' y2='105' stroke='#0f6cbd' stroke-width='2' marker-end='url(#ahb)'/><text x='400' y='172' text-anchor='middle' fill='#5b6b7a' font-size='12.5' font-weight='400'>Filter the dimension — the relationship propagates it to the fact automatically</text><rect x='150' y='192' width='500' height='34' rx='6' fill='#eaf3fb' stroke='#b45309' stroke-width='1'/><text x='400' y='214' text-anchor='middle' fill='#b45309' font-size='11.5' font-weight='600'>Gotcha: a Viewer in NO role sees ALL rows — RLS is not deny-by-default</text></svg>