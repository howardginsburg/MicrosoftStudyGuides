<svg viewBox='0 0 800 300' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Direct Lake on OneLake versus on SQL analytics endpoint' font-family='Segoe UI,Arial,sans-serif'><title>Direct Lake on OneLake versus on SQL analytics endpoint</title><rect x='0' y='0' width='800' height='300' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Direct Lake: two flavors</text><text x='40' y='120.0' text-anchor='start' fill='#0b3d63' font-size='12' font-weight='700'>Data source</text><text x='40' y='172.0' text-anchor='start' fill='#0b3d63' font-size='12' font-weight='700'>DirectQuery fallback</text><text x='40' y='224.0' text-anchor='start' fill='#0b3d63' font-size='12' font-weight='700'>Composite models</text><text x='40' y='276.0' text-anchor='start' fill='#0b3d63' font-size='12' font-weight='700'>SQL-endpoint RLS/OLS</text><rect x='250' y='56' width='258' height='34' rx='8' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='379.0' y='79.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Direct Lake on OneLake</text><rect x='250' y='90' width='258' height='52' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='379.0' y='120.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>One or more Fabric Delta sources</text><rect x='250' y='142' width='258' height='52' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='379.0' y='172.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Never falls back</text><rect x='250' y='194' width='258' height='52' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='379.0' y='224.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Supported (+ Import tables)</text><rect x='250' y='246' width='258' height='52' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='379.0' y='276.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Not applied (OneLake file access)</text><rect x='520' y='56' width='258' height='34' rx='8' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='649.0' y='79.0' text-anchor='middle' fill='#ffffff' font-size='13' font-weight='600'>Direct Lake on SQL endpoint</text><rect x='520' y='90' width='258' height='52' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='649.0' y='120.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Single lakehouse / warehouse</text><rect x='520' y='142' width='258' height='52' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='649.0' y='172.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Falls back to DirectQuery</text><rect x='520' y='194' width='258' height='52' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='649.0' y='224.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Not supported</text><rect x='520' y='246' width='258' height='52' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='649.0' y='276.0' text-anchor='middle' fill='#1b2733' font-size='11.3' font-weight='400'>Honored (may fall back)</text></svg>