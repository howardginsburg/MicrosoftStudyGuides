<svg viewBox='0 0 800 230' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Medallion bronze silver gold layers' font-family='Segoe UI,Arial,sans-serif'><title>Medallion bronze silver gold layers</title><rect x='0' y='0' width='800' height='230' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='32' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Medallion architecture</text><rect x='40' y='70' width='200' height='110' rx='12' fill='#a97142' stroke='none' stroke-width='1.5'/><text x='140' y='110' text-anchor='middle' fill='#ffffff' font-size='20' font-weight='700'>Bronze</text><text x='140' y='135' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Raw / ingested</text><text x='140' y='155' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='400'>As-is source data</text><line x1='240' y1='125' x2='298' y2='125' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='298' y='70' width='200' height='110' rx='12' fill='#8a9199' stroke='none' stroke-width='1.5'/><text x='398' y='110' text-anchor='middle' fill='#ffffff' font-size='20' font-weight='700'>Silver</text><text x='398' y='135' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Cleaned / conformed</text><text x='398' y='155' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='400'>Validated, de-duplicated</text><line x1='498' y1='125' x2='556' y2='125' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='556' y='70' width='200' height='110' rx='12' fill='#c9a227' stroke='none' stroke-width='1.5'/><text x='656' y='110' text-anchor='middle' fill='#ffffff' font-size='20' font-weight='700'>Gold</text><text x='656' y='135' text-anchor='middle' fill='#ffffff' font-size='12.5' font-weight='600'>Curated / modeled</text><text x='656' y='155' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='400'>Star schemas, aggregates</text><text x='400' y='205' text-anchor='middle' fill='#5b6b7a' font-size='12.5' font-weight='400'>Refine data left → right; each layer adds quality and business meaning</text></svg>