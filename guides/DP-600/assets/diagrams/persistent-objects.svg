<svg viewBox='0 0 800 172' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Views stored procedures and functions' font-family='Segoe UI,Arial,sans-serif'><title>Views stored procedures and functions</title><rect x='0' y='0' width='800' height='172' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Persistent warehouse objects</text><rect x='40' y='60' width='240' height='92' rx='10' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='160' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>View</text><text x='160' y='116' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='600'>Saved SELECT</text><text x='160' y='135' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>Always current, reusable logic</text><rect x='288' y='60' width='240' height='92' rx='10' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='408' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Stored procedure</text><text x='408' y='116' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='600'>Runs T-SQL steps</text><text x='408' y='135' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>Parameterized ETL / DML</text><rect x='536' y='60' width='240' height='92' rx='10' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='656' y='92' text-anchor='middle' fill='#ffffff' font-size='15' font-weight='700'>Function</text><text x='656' y='116' text-anchor='middle' fill='#eaf3fb' font-size='11.5' font-weight='600'>Returns a value/table</text><text x='656' y='135' text-anchor='middle' fill='#eaf3fb' font-size='10.3' font-weight='400'>Reusable logic in queries</text></svg>