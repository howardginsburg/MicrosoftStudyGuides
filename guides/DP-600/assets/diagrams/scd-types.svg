<svg viewBox='0 0 800 240' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='SCD type 1 versus type 2' font-family='Segoe UI,Arial,sans-serif'><title>SCD type 1 versus type 2</title><rect x='0' y='0' width='800' height='240' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Slowly changing dimensions</text><text x='200' y='62' text-anchor='middle' fill='#0b3d63' font-size='13.5' font-weight='700'>Type 1 — overwrite (no history)</text><rect x='70' y='78' width='260' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='200.0' y='97.0' text-anchor='middle' fill='#1b2733' font-size='12' font-weight='600'>Cust 7 · Region: West</text><text x='200' y='128' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>↓ region changes</text><rect x='70' y='138' width='260' height='30' rx='6' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='200.0' y='157.0' text-anchor='middle' fill='#0b3d63' font-size='12' font-weight='600'>Cust 7 · Region: East</text><text x='200' y='188' text-anchor='middle' fill='#b45309' font-size='11.5' font-weight='600'>Old value is lost</text><text x='600' y='62' text-anchor='middle' fill='#0b3d63' font-size='13.5' font-weight='700'>Type 2 — add row (keep history)</text><rect x='470' y='78' width='260' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='600.0' y='97.0' text-anchor='middle' fill='#1b2733' font-size='11.5' font-weight='600'>Cust 7 · West · Current=N</text><text x='600' y='128' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='400'>↓ region changes</text><rect x='470' y='138' width='260' height='30' rx='6' fill='#ffffff' stroke='#c9d6e2' stroke-width='1'/><text x='600.0' y='157.0' text-anchor='middle' fill='#5b6b7a' font-size='11.5' font-weight='600'>Cust 7 · West · 2019–2023</text><rect x='470' y='172' width='260' height='30' rx='6' fill='#eaf3fb' stroke='#c9d6e2' stroke-width='1'/><text x='600.0' y='191.0' text-anchor='middle' fill='#0b3d63' font-size='11.5' font-weight='600'>Cust 7 · East · Current=Y</text><text x='600' y='222' text-anchor='middle' fill='#107c41' font-size='11.5' font-weight='600'>History preserved with validity flags</text></svg>