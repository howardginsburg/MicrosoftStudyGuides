<svg viewBox='0 0 800 212' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Ingestion paths into a lakehouse' font-family='Segoe UI,Arial,sans-serif'><title>Ingestion paths into a lakehouse</title><rect x='0' y='0' width='800' height='212' fill='#ffffff'/><defs><marker id='ah' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#5b6b7a'/></marker><marker id='ahb' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L8,3 L0,6 Z' fill='#0f6cbd'/></marker></defs><text x='400' y='30' text-anchor='middle' fill='#0b3d63' font-size='18' font-weight='700'>Ways to ingest into a lakehouse</text><rect x='30' y='64' width='140' height='64' rx='9' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='100' y='92' text-anchor='middle' fill='#ffffff' font-size='12.8' font-weight='700'>Upload</text><text x='100' y='111' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>drag &amp; drop files</text><line x1='100' y1='128' x2='100' y2='150' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='180' y='64' width='140' height='64' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='250' y='92' text-anchor='middle' fill='#ffffff' font-size='12.8' font-weight='700'>Dataflows Gen2</text><text x='250' y='111' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>Power Query, low-code</text><line x1='250' y1='128' x2='250' y2='150' stroke='#5b6b7a' stroke-width='2' marker-end='url(#ah)'/><rect x='330' y='64' width='140' height='64' rx='9' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400' y='92' text-anchor='middle' fill='#ffffff' font-size='12.8' font-weight='700'>Pipelines</text><text x='400' y='111' text-anchor='middle' fill='#eaf3fb' font-size='10' font-weight='400'>Copy activity, orchestrate</text><line x1='400' y1='128' x2='400' y2='150' stroke='#5b6b7a' stroke-width='2' marker-