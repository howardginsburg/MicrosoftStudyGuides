<svg viewBox='0 0 800 330' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Workspace item row column object and file access layers' font-family='Segoe UI,Arial,sans-serif'><title>Workspace item row column object and file access layers</title><rect x='0' y='0' width='800' height='330' fill='#ffffff'/><text x='400' y='28' text-anchor='middle' fill='#0b3d63' font-size='19' font-weight='700'>Layers of access control</text><rect x='40.0' y='58' width='720' height='52' rx='9' fill='#3a9bdc' stroke='none' stroke-width='1.5'/><text x='400' y='82' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>Workspace roles</text><text x='400' y='100' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Admin / Member / Contributor / Viewer</text><rect x='100.0' y='120' width='600' height='52' rx='9' fill='#0f6cbd' stroke='none' stroke-width='1.5'/><text x='400' y='144' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>Item permissions</text><text x='400' y='162' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Share individual items</text><rect x='160.0' y='182' width='480' height='52' rx='9' fill='#0b3d63' stroke='none' stroke-width='1.5'/><text x='400' y='206' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>Row / Column / Object security</text><text x='400' y='224' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>RLS, CLS, OLS in the model &amp; SQL</text><rect x='220.0' y='244' width='360' height='52' rx='9' fill='#062338' stroke='none' stroke-width='1.5'/><text x='400' y='268' text-anchor='middle' fill='#ffffff' font-size='14' font-weight='700'>OneLake file-level</text><text x='400' y='286' text-anchor='middle' fill='#eaf3fb' font-size='11' font-weight='400'>Data access roles on /Files &amp; /Tables</text><text x='400' y='314' text-anchor='middle' fill='#5b6b7a' font-size='12' font-weight='400'>Broad → narrow: combine layers for defense in depth</text></svg>